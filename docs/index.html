<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gamify Photography - Developer Docs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Developer documentation for the Gamify Photography ecosystem including mobile app and admin portal.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #3b82f6; /* Royal Blue */
    }
    .markdown-section {
      max-width: 80% !important;
      padding: 30px 45px 40px 45px;
    }
    .sidebar {
      background-color: #f8fafc;
      border-right: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'Gamify Photography',
      repo: 'https://github.com/aryapras22/gamifikasi-fotografi',
      loadSidebar: true,
      subMaxLevel: 3,
      homepage: 'README.md',
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results found!',
        depth: 6
      }
    }
  </script>
  <!-- Docsify Engine -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Search plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
